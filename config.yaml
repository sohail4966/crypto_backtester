symbol: BTC/USDT
timeframe: 5m
years: 8
exchange_id: binance
initial_capital: 10000.0
output_dir: output
equity_curve_filename: equity_curve.png

backtest:
  slippage_bps: 5
  commission:
    type: percent
    rate: 0.001
  sizing:
    mode: full_capital
  export_trades: true
  trades_csv: output/trades.csv

# Showcase strategy: dual long/short, multi-indicator AND groups, cross-indicator
# comparisons, volume + momentum + trend filters, per-side sizing, ATR trail vs
# fixed stops, risk-reward vs fixed take profit, benchmark, fees, and CSV export.
active_strategy: full_stack_confluence

strategies:
  full_stack_confluence:
    benchmark: symbol
    # edge = one entry per signal flip (fixes stop-out re-entry churn on 15m/1h)
    entry_trigger: edge

    long:
      sizing:
        mode: risk_pct
        risk_pct: 0.04
      entry:
        all:
          - indicator: ADX
            params:
              period: 14
            op: ">"
            value: 25
          - indicator: SUPERTREND
            params:
              period: 10
              multiplier: 3.0
            op: "<"
            compare: close
          - indicator: EMA
            params:
              period: 9
            op: ">"
            compare:
              indicator: EMA
              params:
                period: 21
          - indicator: SMA
            params:
              period: 50
            op: "<"
            compare: close
          - indicator: MACD_HIST
            params:
              fast: 12
              slow: 26
              signal: 9
            op: ">"
            value: 0
          - indicator: CMF
            params:
              period: 20
            op: ">"
            value: 0
          - indicator: RSI
            params:
              period: 14
            op: "<"
            value: 70
      exit:
        indicator: SUPERTREND
        params:
          period: 10
          multiplier: 2.0
        op: ">"
        compare: close
      stop_loss:
        type: atr_trail
        period: 14
        multiplier: 2.5
      take_profit:
        type: risk_reward
        ratio: 3.0

    short:
      sizing:
        mode: fixed_pct
        pct: 0.5
      entry:
        all:
          - indicator: ADX
            params:
              period: 14
            op: ">"
            value: 25
          - indicator: SUPERTREND
            params:
              period: 10
              multiplier: 3.0
            op: ">"
            compare: close
          - indicator: EMA
            params:
              period: 9
            op: "<"
            compare:
              indicator: EMA
              params:
                period: 21
          - indicator: SMA
            params:
              period: 50
            op: ">"
            compare: close
          - indicator: MACD_HIST
            params:
              fast: 12
              slow: 26
              signal: 9
            op: "<"
            value: 0
          - indicator: MFI
            params:
              period: 14
            op: ">"
            value: 70
          - indicator: RSI
            params:
              period: 14
            op: ">"
            value: 60
      exit:
        indicator: SUPERTREND
        params:
          period: 10
          multiplier: 3.0
        op: "<"
        compare: close
      stop_loss:
        type: atr
        period: 14
        multiplier: 1.5
      take_profit:
        type: fixed
        offset_pct: 0.06
