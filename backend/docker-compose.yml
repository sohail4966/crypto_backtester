services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: backtester
      POSTGRES_PASSWORD: backtester
      POSTGRES_DB: backtester
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backtester -d backtester"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  timescale_data:
